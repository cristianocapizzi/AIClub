<!DOCTYPE html>
<html lang="it">

<head>
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="AI Champions">
    <meta property="og:title" content="Auguri AI Champions">
    <meta property="og:description" content="Accesso rapido alla procedura di sicurezza">
    <meta property="og:url" content="https://cristianocapizzi.github.io/AIClub/GamePaky.html">
    <meta property="og:image" content="https://cristianocapizzi.github.io/AIClub/GamePaky.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Auguri AI Champions">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://cristianocapizzi.github.io/AIClub/GamePaky.jpg">
    <title>Auguri AI Champions</title>
    <style>
        :root {
            --color-ai-bg: #1e3a8a;
            /* Blu scuro professionale */
            --color-ai-accent: #60a5fa;
            /* Blu chiaro AI */
            --color-egg: #f87171;
            /* Rosso uovo */
            --color-message: #fbbf24;
            /* Giallo oro per il testo finale */
            --color-bg-page: #f3f4f6;
            /* Sfondo pagina chiaro */
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden; /* evita scrollbar indesiderate */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--color-bg-page);
            background-image: url('');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenitore Principale del Robot:
           è un semplice wrapper che si adatta all'immagine */
        .robot-canvas {
            position: relative;
            /* Si restringe attorno all'immagine */
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        /* Immagine del Robot Base:
           è LEI che comanda il sizing — mai più alta di 88vh e mai più larga di 90vw */
        .robot-base {
            max-height: 88vh;
            max-width: 90vw;
            width: auto;
            height: auto;
            display: block;
            border-radius: 20px;
        }

        /* L'interfaccia CHAT nella pancia */
        .chat-interface {
            position: absolute;
            bottom: 12%;
            /* Regola questo valore per centrare sullo schermo della pancia */
            left: 45%;
            transform: translateX(-50%);
            width: 50%;
            /* Larghezza dello schermo sulla pancia */
            height: 40%;
            /* Altezza dello schermo sulla pancia */
            background-color: rgba(255, 255, 255, 0.95);
            border: 2px solid var(--color-ai-accent);
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Output della chat */
        .chat-output {
            flex-grow: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
            scroll-behavior: smooth;
        }

        /* Messaggi della chat */
        .message {
            padding: 6px 10px;
            border-radius: 8px;
            font-size: clamp(9px, 1.5vmin, 14px);
            max-width: 80%;
        }

        .message.system {
            background-color: #e5e7eb;
            align-self: flex-start;
            font-style: italic;
        }

        .message.user {
            background-color: var(--color-ai-accent);
            color: white;
            align-self: flex-end;
        }

        /* Input della chat */
        .chat-input-area {

            display: flex;
            border-top: 1px solid #d1d5db;
        }

        .chat-input {
            flex-grow: 0;
            width: 60%;
            border: none;
            padding: clamp(6px, 1.5vmin, 15px);
            font-size: clamp(10px, 1.8vmin, 15px);
            outline: none;
        }

        .chat-send-btn {
            background-color: var(--color-ai-accent);
            color: white;
            border: none;
            padding: 0 15px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .chat-send-btn:hover {
            background-color: #3b82f6;
        }

        /* --- L'UOVO E LE ANIMAZIONI --- */

        /* Posizione dell'uovo (sopra la chat) */
        #easter-egg-container {
            position: absolute;
            bottom: 20%;
            /* Un po' più in alto della chat */
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 300px;
            display: none;
            /* Nascondi all'inizio */
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            /* Non intralcia la chat */
        }

        .egg {
            width: 180px;
            height: 240px;
            background-color: #ff9a9e;
            background-image: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a18cd1 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: inset -15px -15px 20px rgba(0, 0, 0, 0.15), 0 15px 25px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            animation: none;
        }

        .egg::before {
            content: "";
            position: absolute;
            top: 25%;
            left: -10%;
            width: 120%;
            height: 35px;
            background: #ffd700;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1), 0 -4px 6px rgba(0, 0, 0, 0.1);
            transform: rotate(-8deg);
        }

        .egg::after {
            content: "";
            position: absolute;
            bottom: 25%;
            left: -10%;
            width: 120%;
            height: 40px;
            background: repeating-linear-gradient(45deg, #00ced1, #00ced1 10px, #40e0d0 10px, #40e0d0 20px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1), 0 -4px 6px rgba(0, 0, 0, 0.1);
            transform: rotate(5deg);
        }

        /* Effetto Vibrazione */
        .vibrate {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% {
                transform: translate(1px, 1px) rotate(0deg);
            }

            10% {
                transform: translate(-1px, -2px) rotate(-1deg);
            }

            20% {
                transform: translate(-3px, 0px) rotate(1deg);
            }

            30% {
                transform: translate(3px, 2px) rotate(0deg);
            }

            40% {
                transform: translate(1px, -1px) rotate(1deg);
            }

            50% {
                transform: translate(-1px, 2px) rotate(-1deg);
            }

            60% {
                transform: translate(-3px, 1px) rotate(0deg);
            }

            70% {
                transform: translate(3px, 1px) rotate(-1deg);
            }

            80% {
                transform: translate(-1px, -1px) rotate(1deg);
            }

            90% {
                transform: translate(1px, 2px) rotate(0deg);
            }

            100% {
                transform: translate(1px, -2px) rotate(-1deg);
            }
        }

        /* Effetto Schiusa (scale-out) */
        .hatched {
            transform: scale(0.1);
            opacity: 0;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        }

        /* Il Messaggio Finale Tema Pasqua */
        #final-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 9999;
            background: linear-gradient(135deg, #e0f7fa 0%, #fce4ec 50%, #fff9c4 100%);
            border: 6px dashed #f8bbd0;
            padding: 40px 80px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.8);
            text-align: center;
            font-size: 55px;
            font-weight: bold;
            color: #d81b60;
            font-family: 'Brush Script MT', 'Comic Sans MS', 'Segoe Print', cursive, sans-serif;
            line-height: 1.2;
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.9);
            animation: message-pop-in 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: auto;
            /* Permette il clic per resettare */
            cursor: pointer;
            transition: filter 0.2s ease;
        }

        #final-message:hover {
            filter: brightness(1.05);
            /* Effetto luminoso al passaggio del mouse */
        }

        @keyframes message-pop-in {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-5deg);
                opacity: 0;
            }

            70% {
                transform: translate(-50%, -50%) scale(1.1) rotate(3deg);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* Uova di cioccolato cadenti */
        .choco-egg {
            position: fixed;
            top: -100px;
            background: radial-gradient(circle at 35% 35%, #8b4513, #4a230b);
            /* Puro cioccolato */
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: inset -5px -5px 10px rgba(0, 0, 0, 0.4), 0 5px 10px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 10000;
            animation: fall-choco linear forwards;
        }

        /* Alcune uova avvolte in stagnola colorata */
        .choco-egg.wrapped-gold {
            background: radial-gradient(circle at 35% 35%, #ffd700, #b8860b);
        }

        .choco-egg.wrapped-red {
            background: radial-gradient(circle at 35% 35%, #ff4b4b, #8b0000);
        }

        .choco-egg.wrapped-blue {
            background: radial-gradient(circle at 35% 35%, #4da6ff, #00008b);
        }

        @keyframes fall-choco {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        /* --- Citazione Ispirazionale --- */
        .inspirational-quote {
            position: fixed;
            bottom: 3vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: rgba(20, 30, 50, 0.6);
            /* Sfondo scuro semitrasparente che garantisce massima leggibilità */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 18px 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.15rem;
            font-style: italic;
            text-align: center;
            width: max-content;
            max-width: 90vw;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        .inspirational-quote strong {
            color: #fcd34d;
            /* Tassello dorato per evidenziare */
            font-weight: bold;
        }

        /* --- Logo A2A --- */
        .brand-logo {
            position: fixed;
            top: 30px;
            /* Posizione in alto al centro */
            left: 35%;
            transform: translateX(-50%);
            z-index: 50;
            width: 200px;
            max-width: 80vw;
            /* Logo ingrandito */
            /* Alone bianco molto morbido e luminoso per renderlo sempre leggibile */
            filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 1)) drop-shadow(0px 2px 5px rgba(255, 255, 255, 0.8));
            pointer-events: none;
        }
    </style>
</head>

<body>

    <!-- Logo Aziendale A2A in alto al centro -->
    <img src="https://raw.githubusercontent.com/cristianocapizzi/AIClub/main/logo-Di-Sabatino.gif" alt="A2A Logo"
        class="brand-logo">

    <!-- Citazione Ispirazionale -->
    <div class="inspirational-quote">
        "La sperimentazione è il ponte tra l'immaginazione e la realtà.<br>
        Non aver paura di sbagliare: <strong>ogni tentativo è un tassello del tuo capolavoro.</strong>"
    </div>

    <div id="final-message" onclick="resetEasterEgg()">
        🐰 Buona Pasqua 🐣<br><span style="color:#0288d1;">AI Champions!</span> 🌸<br>
        <div
            style="font-size: 18px; color: #666; font-family: 'Segoe UI', sans-serif; margin-top: 20px; font-weight: normal; letter-spacing: 0;">
            (Clicca qui per ricominciare)
        </div>
    </div>

    <div class="robot-canvas">
        <img src="https://raw.githubusercontent.com/cristianocapizzi/AIClub/main/Bunny.png" alt="Robot Pasquale AI"
            class="robot-base">
        <div id="easter-egg-container">
            <div class="egg"></div>
        </div>


        <div class="chat-interface">
            <div id="chat-output" class="chat-output">
                <div class="message system">Ciao Champion! augurami "Buona Pasqua" per una sorpresa.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" class="chat-input" placeholder="Scrivi qui...">
                <button id="chat-send-btn" class="chat-send-btn">🤖</button>
            </div>
        </div>
    </div>

    <script>
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send-btn');
        const chatOutput = document.getElementById('chat-output');
        const eggContainer = document.getElementById('easter-egg-container');
        const egg = eggContainer.querySelector('.egg');
        const finalMessage = document.getElementById('final-message');

        // Funzione per inviare il messaggio
        function sendMessage() {
            const text = chatInput.value.trim().toLowerCase();
            if (text === "") return;

            // Aggiungi messaggio utente
            addMessage(chatInput.value.trim(), 'user');
            chatInput.value = ""; // Pulisci input

            // Controlla la parola chiave "buona pasqua"
            if (text === "buona pasqua") {
                triggerEasterEgg();
            } else {
                // Risposta di default per l'IA
                addMessage("sono qui per dirti \"Buona Pasqua\"! ma dimmelo anche tu", 'system');
            }
        }

        // Aggiungi messaggio visivo
        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', type);
            messageDiv.textContent = text;
            chatOutput.appendChild(messageDiv);
            chatOutput.scrollTop = chatOutput.scrollHeight; // Scroll automatico
        }

        // La sequenza dell'Easter Egg
        function triggerEasterEgg() {
            // Disabilita la chat per evitare interruzioni
            chatInput.disabled = true;
            chatSendBtn.disabled = true;

            // 1. Mostra l'uovo e fallo vibrare
            eggContainer.style.display = 'flex';
            egg.classList.add('vibrate');

            // 2. Dopo 3 secondi, l'uovo si schiude
            setTimeout(() => {
                egg.classList.remove('vibrate');
                egg.classList.add('hatched'); // Effetto schiusa
            }, 3000);

            // 3. Dopo altri 0.3 secondi (tempo dell'animazione di schiusa), mostra il messaggio finale
            setTimeout(() => {
                eggContainer.style.display = 'none'; // Nascondi uovo
                finalMessage.style.display = 'block'; // Mostra messaggio

                // Sfoca lo sfondo per dare risalto al messaggio
                const canvasBox = document.querySelector('.robot-canvas');
                canvasBox.style.transition = 'filter 0.5s ease';
                canvasBox.style.filter = 'blur(8px) grayscale(30%)';

                // Lancia pioggia di uova di cioccolato!
                const wrappers = ['', 'wrapped-gold', 'wrapped-red', 'wrapped-blue'];
                for (let i = 0; i < 60; i++) {
                    setTimeout(() => {
                        const chocoEgg = document.createElement('div');
                        chocoEgg.classList.add('choco-egg');

                        // 30% di probabilità che l'uovo sia avvolto in carta stagnola colorata
                        if (Math.random() > 0.7) {
                            const randomWrap = wrappers[1 + Math.floor(Math.random() * (wrappers.length - 1))];
                            chocoEgg.classList.add(randomWrap);
                        }

                        // Posizione orizzontale casuale
                        chocoEgg.style.left = Math.random() * 100 + 'vw';

                        // Dimensione casuale
                        const size = 15 + Math.random() * 25;
                        chocoEgg.style.width = size + 'px';
                        chocoEgg.style.height = (size * 1.35) + 'px';

                        // Velocità di caduta casuale
                        chocoEgg.style.animationDuration = 2 + Math.random() * 3.5 + 's';

                        document.body.appendChild(chocoEgg);

                        // Pulizia automatica
                        setTimeout(() => chocoEgg.remove(), 6000);
                    }, Math.random() * 3500);
                }
            }, 3300);
        }

        // Funzione per ricominciare (attivata dal click sul messaggio)
        function resetEasterEgg() {
            // Nasconde il messaggio
            finalMessage.style.display = 'none';

            // Rimuove la sfocatura dallo sfondo
            const canvasBox = document.querySelector('.robot-canvas');
            canvasBox.style.filter = 'none';

            // Resetta lo stato dell'uovo CSS
            eggContainer.style.display = 'none';
            egg.classList.remove('hatched');
            egg.classList.remove('vibrate');

            // Riabilita la chat
            chatInput.disabled = false;
            chatSendBtn.disabled = false;
            chatInput.value = "";
            chatInput.focus();

            // Aggiunge un messaggio extra per indicare che si può rifare
            addMessage("Tutto pronto! Riprova se vuoi un'altra cascata di cioccolato!", 'system');
        }

        // Eventi per invio messaggio
        chatSendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

    </script>
</body>

</html>
